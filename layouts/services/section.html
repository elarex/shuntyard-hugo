{{ define "main" }}
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Params.lead }}<p class="tagline">{{ . }}</p>{{ end }}
  </header>

  {{ .Content }}

  <div class="card-grid">
    {{ range hugo.Data.services }}
      <article>
        <h3>{{ .title }}</h3>
        <p>{{ .summary }}</p>
      </article>
    {{ end }}
  </div>
{{ end }}
