baseURL = 'https://shuntyard.com/'
locale = 'en-au'
title = 'Shuntyard Technologies'

# Pico is fairly compact; keep summaries readable.
summaryLength = 30

# No taxonomies on this site yet.
disableKinds = ['taxonomy', 'term']
[taxonomies]

[params]
  description = 'Shuntyard Technologies builds business systems that make business sense, specialising in web application development and AI.'
  tagline = 'Business Systems. Business Sense.'
  phone = '(+61) 402 005 372'

  # Business details shown in the footer.
  [params.business]
    legalName = 'Shuntyard Technologies'

  # Office locations.
  [[params.locations]]
    street = '265 Wharf Road'
    city = 'Newcastle'
    region = 'NSW'
    postcode = '2300'
    country = 'Australia'

  # Contact email addresses.
  [params.emails]
    general = 'info@shuntyard.com'
    sales = 'sales@shuntyard.com'
    support = 'support@shuntyard.com'

  # Social links. Add more entries as they come online.
  [[params.socials]]
    name = 'LinkedIn'
    url = 'https://www.linkedin.com/company/shuntyard'

[menu]
  [[menu.main]]
    name = 'Services'
    pageRef = '/services'
    weight = 10
  [[menu.main]]
    name = 'Showcase'
    pageRef = '/showcase'
    weight = 20
  [[menu.main]]
    name = 'Technology'
    pageRef = '/technology'
    weight = 30
  [[menu.main]]
    name = 'Contact'
    pageRef = '/contact'
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
